name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # __VERSION__ is substituted by tauri-action from the app's own version
          # (tauri.conf.json/Cargo.toml). Deliberately NOT github.ref_name -- that
          # resolves to the *branch* name on a manual workflow_dispatch run, not the
          # pushed tag, which is what shipped a release literally named "master".
          tagName: v__VERSION__
          releaseName: "Now Playing Flagger v__VERSION__"
          releaseBody: "Windows build. Download the `.exe` installer below, run it, and look for the tray icon."
          releaseDraft: false
          prerelease: false

      # Keeps exactly one release/tag around: the one this run just published. Runs only if
      # the step above succeeded (the default for a GitHub Actions job), so there's never a
      # window where cleanup runs but no new release exists. Deliberately reads the version
      # from tauri.conf.json rather than github.ref_name, for the same reason as the tagName
      # override above -- ref_name resolves to the branch on a manual workflow_dispatch run,
      # and using it here would find no matching release/tag and delete every real one.
      - name: Delete all other releases and tags
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          current_tag="v$(jq -r .version src-tauri/tauri.conf.json)"
          echo "Current release to keep: $current_tag"

          all_tags=$(gh release list --limit 100 --json tagName --jq '.[].tagName')

          # Sanity check before deleting anything: if the tag we intend to keep isn't even in
          # the list, something upstream is wrong (e.g. version extraction broke) -- abort
          # rather than proceed to wipe out every existing release.
          if ! grep -qx "$current_tag" <<< "$all_tags"; then
            echo "::error::Current tag $current_tag not found among releases -- aborting cleanup to avoid deleting everything."
            exit 1
          fi

          while IFS= read -r tag; do
            if [ "$tag" != "$current_tag" ]; then
              echo "Deleting old release+tag: $tag"
              # --cleanup-tag also deletes the underlying git ref, which 422s if that ref is
              # already gone (confirmed live for v0.2.3: an orphaned release left over from
              # before this automation existed, with no matching tag). The release itself still
              # gets deleted in that case -- only the tag-ref cleanup call fails -- so a single
              # 422 here isn't a real failure. Don't let it abort the loop via set -e; the
              # end-state check below is the actual pass/fail gate, not each command's exit code.
              if ! gh release delete "$tag" --cleanup-tag --yes; then
                echo "::warning::Delete of $tag reported an error (often just an already-gone tag ref); continuing"
              fi
            fi
          done <<< "$all_tags"

          remaining=$(gh release list --limit 100 --json tagName --jq '.[].tagName')
          if [ "$remaining" != "$current_tag" ]; then
            echo "::error::Cleanup didn't converge -- releases remaining: $remaining"
            exit 1
          fi

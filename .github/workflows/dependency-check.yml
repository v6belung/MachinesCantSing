name: Dependency age check

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main, master]
    paths:
      - "package.json"
      - "package-lock.json"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run check:deps
